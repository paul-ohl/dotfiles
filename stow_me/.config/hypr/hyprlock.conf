auth {
  pam:enabled = true
  par:module = hyprlock
}

animations {
  enabled = true
}

background {
  monitor =
  path = screenshot
  color = rgba(25, 20, 20, 1.0)
  blur_passes = 4
  blur_size = 3
}

image {
  monitor =
  path = /home/astro/.config/hypr/logo/pp.png
  size = 150
  rounding = -1

  position = 0, -20
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 170, 170
  outline_thickness = 5
  inner_color = rgba(0, 0, 0, 0.0) # no fill
  outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
  check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
  fail_color=rgba(ff0000ee) rgba(ff0000ee) 40deg

  placeholder_text =
  fail_text =

  font_color = rgb(143, 143, 143)
  fade_on_empty = false
  hide_input = true

  rounding = -1
  position = 0, -20
  halign = center
  valign = center
}

label {
  monitor =
  text = $USER
  color = rgba(200, 200, 200, 1.0)
  font_size = 45
  font_family = Mononoki Nerd Font

  position = 0, 150
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  color = rgba(200, 200, 200, 1.0)
  font_size = 70
  font_family = Mononoki Nerd Font

  position = 0, 270
  halign = center
  valign = center
}

bind {
  key = Escape
  action = hyprctl dispatch dpms off
}

bind {
  key = X
  action = hyprctl dispatch dpms on
}
